<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KMTronic — Panel de control</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #111118; --surface2: #1a1a24;
      --border: rgba(255,255,255,0.07); --border-hi: rgba(255,255,255,0.15);
      --text: #e8e8f0; --text-muted: #6b6b80; --text-dim: #3a3a4a;
      --on: #00e57a; --on-glow: rgba(0,229,122,0.15); --on-border: rgba(0,229,122,0.4);
      --off: #ff3d5a; --off-glow: rgba(255,61,90,0.12); --off-border: rgba(255,61,90,0.35);
      --accent: #6c63ff; --mono: 'JetBrains Mono', monospace; --sans: 'Syne', sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; padding: 2rem 1.5rem 4rem; }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: linear-gradient(rgba(108,99,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(108,99,255,0.03) 1px,transparent 1px);
      background-size: 40px 40px;
    }
    .wrap { max-width: 860px; margin: 0 auto; position: relative; z-index: 1; }

    /* Header */
    header { display: flex; align-items: flex-end; justify-content: space-between; gap: 1rem; margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .logo { font-family: var(--sans); font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em; }
    .logo span { color: var(--accent); }
    .header-meta { text-align: right; }
    .poll-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.68rem; color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase;
      padding: 4px 10px; border: 1px solid var(--border); border-radius: 20px; background: var(--surface);
    }
    .poll-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); transition: background 0.3s; flex-shrink: 0; }
    .poll-dot.active { background: var(--on); animation: pulse 0.7s ease-out; }
    .poll-countdown { font-size: 0.6rem; color: var(--text-dim); margin-top: 4px; text-align: right; }
    @keyframes pulse { 0%{transform:scale(2);opacity:.5} 100%{transform:scale(1);opacity:1} }

    /* Config */
    .config { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .config label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
    .config input { background: var(--surface); border: 1px solid var(--border-hi); color: var(--text); font-family: var(--mono); font-size: 0.85rem; padding: 0.4rem 0.75rem; border-radius: 6px; outline: none; width: 220px; }
    .config input:focus { border-color: var(--accent); }
    .btn { font-family: var(--mono); font-size: 0.75rem; padding: 0.4rem 1rem; border-radius: 6px; border: 1px solid var(--border-hi); background: var(--surface2); color: var(--text); cursor: pointer; letter-spacing: 0.03em; transition: all 0.15s; white-space: nowrap; }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn.primary { border-color: var(--accent); color: var(--accent); }
    .btn.active { border-color: var(--accent); color: var(--accent); background: rgba(108,99,255,0.1); }

    /* Cards */
    #devices-container { display: flex; flex-direction: column; gap: 1.5rem; }
    .device-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .device-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); gap: 1rem; flex-wrap: wrap; }
    .device-id { font-family: var(--sans); font-size: 1rem; font-weight: 700; }
    .device-meta { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }
    .badge { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; padding: 3px 10px; border-radius: 4px; border: 1px solid; }
    .badge.connected { color: var(--on); border-color: var(--on-border); background: var(--on-glow); }
    .badge.disconnected { color: var(--text-muted); border-color: var(--border); }
    .device-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    /* Relays */
    .relays-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: var(--border); }
    @media(max-width:580px){ .relays-grid{grid-template-columns:repeat(2,1fr)} }
    .relay-cell { background: var(--surface); padding: 1.1rem 1rem; display: flex; flex-direction: column; gap: 0.6rem; transition: background 0.2s; position: relative; }
    .relay-cell:hover { background: var(--surface2); }
    .relay-num { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; }
    .relay-indicator { display: flex; align-items: center; gap: 8px; }
    .relay-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; transition: background 0.3s, box-shadow 0.3s; }
    .relay-dot.on  { background: var(--on);  box-shadow: 0 0 8px var(--on); }
    .relay-dot.off { background: var(--off); box-shadow: none; }
    .relay-dot.unknown { background: var(--text-dim); }
    .relay-label { font-size: 0.8rem; font-weight: 500; }
    .relay-label.on  { color: var(--on); }
    .relay-label.off { color: var(--off); }
    .relay-label.unknown { color: var(--text-muted); }
    .relay-toggle { display: flex; gap: 6px; margin-top: 4px; }
    .relay-btn { flex:1; font-family:var(--mono); font-size:0.68rem; padding:5px 4px; border-radius:5px; border:1px solid var(--border); background:transparent; color:var(--text-muted); cursor:pointer; letter-spacing:0.04em; transition:all 0.15s; }
    .relay-btn.turn-on:hover  { border-color:var(--on-border);  color:var(--on);  background:var(--on-glow);  }
    .relay-btn.turn-off:hover { border-color:var(--off-border); color:var(--off); background:var(--off-glow); }
    .relay-btn.active-on  { border-color:var(--on-border);  color:var(--on);  background:var(--on-glow);  }
    .relay-btn.active-off { border-color:var(--off-border); color:var(--off); background:var(--off-glow); }
    .relay-btn:active { transform: scale(0.95); }
    .relay-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    /* Spinner overlay por celda */
    .spin-ov { position:absolute; inset:0; background:rgba(10,10,15,0.6); display:flex; align-items:center; justify-content:center; z-index:2; }
    .spin { width:16px; height:16px; border:2px solid var(--border-hi); border-top-color:var(--accent); border-radius:50%; animation:spin 0.6s linear infinite; }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Status bar */
    .statusbar { margin-top:2rem; padding:0.6rem 1rem; background:var(--surface); border:1px solid var(--border); border-radius:8px; font-size:0.7rem; color:var(--text-muted); display:flex; align-items:center; gap:.75rem; }
    .statusbar .ts { color:var(--text-dim); margin-left:auto; font-size:0.65rem; }
    .err { color:var(--off); }
    .ok  { color:var(--on); }
    .empty { text-align:center; padding:4rem 2rem; color:var(--text-muted); font-size:.85rem; border:1px dashed var(--border); border-radius:12px; }
    .empty strong { display:block; font-family:var(--sans); font-size:1.1rem; color:var(--text-dim); margin-bottom:.5rem; }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div><div class="logo">KM<span>Tronic</span> control</div></div>
    <div class="header-meta">
      <div class="poll-badge">
        <div class="poll-dot" id="poll-dot"></div>
        <span id="poll-label">sin datos</span>
      </div>
      <div class="poll-countdown" id="poll-countdown"></div>
    </div>
  </header>

  <div class="config">
    <label>API URL</label>
    <input type="text" id="api-url" value="http://localhost:3000/api">
    <button class="btn primary" onclick="fetchDevices()">↻ refrescar</button>
    <button class="btn" id="auto-btn" onclick="toggleAuto()">poll: off</button>
    <label style="margin-left:.5rem">intervalo</label>
    <input type="number" id="poll-interval" value="30" min="5" max="300" style="width:70px">
    <label>s</label>
  </div>

  <div id="devices-container">
    <div class="empty"><strong>sin dispositivos</strong>Configura la URL y pulsa refrescar</div>
  </div>

  <div class="statusbar">
    <span id="status-msg">listo</span>
    <span class="ts" id="status-ts"></span>
  </div>
</div>

<script>
// ─── Estado global ────────────────────────────────────────────────────────────
// Mapa id → { relays: [{relay, state}...], status } — fuente de verdad en el front
const deviceState = {};

let autoTimer    = null;  // setInterval del poll periódico
let countdownTmr = null;  // setInterval del contador visual
let nextPollIn   = 0;

// ─── Helpers ─────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const apiBase = () => $('api-url').value.replace(/\/$/, '');

function setStatus(msg, cls) {
  const el = $('status-msg');
  el.textContent = msg;
  el.className = cls || '';
  $('status-ts').textContent = new Date().toLocaleTimeString();
}

function flashPoll(label) {
  const dot = $('poll-dot');
  dot.classList.remove('active');
  void dot.offsetWidth;
  dot.classList.add('active');
  $('poll-label').textContent = label || new Date().toLocaleTimeString();
}

// ─── Relay state store ────────────────────────────────────────────────────────
// Se llama cada vez que la API devuelve el estado real confirmado por UDP.
function storeRelays(deviceId, relays) {
  if (!deviceState[deviceId]) deviceState[deviceId] = {};
  deviceState[deviceId].relays = relays;
  flashPoll(new Date().toLocaleTimeString());
  updateRelaysUI(deviceId, relays);
}

// ─── Fetch lista de devices (GET /api/devices) ────────────────────────────────
async function fetchDevices() {
  setStatus('consultando dispositivos...');
  try {
    const res = await fetch(`${apiBase()}/devices`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const devices = await res.json();
    renderDevices(devices);
    // Guardar estado inicial recibido
    devices.forEach(d => {
      deviceState[d.id] = { relays: d.relays, status: d.status };
    });
    setStatus(`${devices.length} dispositivo(s) cargados`, 'ok');
  } catch (e) {
    setStatus(`error: ${e.message}`, 'err');
    $('devices-container').innerHTML =
      `<div class="empty"><strong>sin conexión</strong>${e.message}</div>`;
  }
}

// ─── Poll periódico: query UDP por cada device ────────────────────────────────
async function pollAll() {
  const ids = Object.keys(deviceState);
  if (!ids.length) { await fetchDevices(); return; }
  setStatus(`polling ${ids.length} dispositivo(s)...`);
  for (const id of ids) {
    try {
      const res = await fetch(`${apiBase()}/device/${id}/query`, { method: 'POST' });
      const data = await res.json();
      if (res.ok && data.relays) storeRelays(id, data.relays);
    } catch (e) {
      console.warn(`poll ${id}:`, e.message);
    }
  }
  setStatus('estado actualizado ✓', 'ok');
}

// ─── Auto poll con countdown ──────────────────────────────────────────────────
function toggleAuto() {
  const btn = $('auto-btn');
  if (autoTimer) {
    clearInterval(autoTimer);
    clearInterval(countdownTmr);
    autoTimer = null; countdownTmr = null;
    btn.textContent = 'poll: off';
    btn.classList.remove('active');
    $('poll-countdown').textContent = '';
  } else {
    startAuto();
  }
}

function startAuto() {
  const secs = Math.max(5, parseInt($('poll-interval').value) || 30);
  const btn = $('auto-btn');
  btn.textContent = `poll: ${secs}s`;
  btn.classList.add('active');

  pollAll(); // inmediato
  nextPollIn = secs;

  autoTimer = setInterval(() => { pollAll(); nextPollIn = secs; }, secs * 1000);

  countdownTmr = setInterval(() => {
    nextPollIn--;
    $('poll-countdown').textContent = `próximo poll: ${nextPollIn}s`;
    if (nextPollIn <= 0) nextPollIn = secs;
  }, 1000);
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderDevices(devices) {
  const c = $('devices-container');
  if (!devices.length) {
    c.innerHTML = '<div class="empty"><strong>sin dispositivos</strong>No hay devices registrados</div>';
    return;
  }
  // Actualizar tarjetas existentes o crear nuevas
  const existing = new Set([...c.querySelectorAll('.device-card')].map(el => el.id));
  devices.forEach(d => {
    if (existing.has(`card-${d.id}`)) {
      // Solo actualizar relés si la tarjeta ya existe
      updateRelaysUI(d.id, d.relays);
    } else {
      c.appendChild(buildCard(d));
    }
  });
}

function buildCard(d) {
  const div = document.createElement('div');
  div.className = 'device-card';
  div.id = `card-${d.id}`;
  const sc = d.status === 'connected' ? 'connected' : 'disconnected';
  div.innerHTML = `
    <div class="device-header">
      <div>
        <div class="device-id">${d.id}</div>
        <div class="device-meta">${d.ip} : ${d.port}</div>
      </div>
      <div style="display:flex;align-items:center;gap:.75rem;flex-wrap:wrap">
        <span class="badge ${sc}" id="badge-${d.id}">${d.status}</span>
        <div class="device-actions">
          <button class="btn" id="qbtn-${d.id}" onclick="doQuery('${d.id}')">query</button>
          <button class="btn" onclick="doAll('${d.id}',true)">all on</button>
          <button class="btn" onclick="doAll('${d.id}',false)">all off</button>
        </div>
      </div>
    </div>
    <div class="relays-grid" id="relays-${d.id}">
      ${buildRelaysHTML(d.id, d.relays || [])}
    </div>`;
  return div;
}

function buildRelaysHTML(deviceId, relays) {
  let html = '';
  for (let i = 0; i < 8; i++) {
    const r = relays[i] || { relay: i+1, state: 'unknown' };
    const s = r.state;
    html += `
      <div class="relay-cell" id="rc-${deviceId}-${i+1}">
        <div class="relay-num">relé ${i+1}</div>
        <div class="relay-indicator">
          <div class="relay-dot ${s}"></div>
          <div class="relay-label ${s}">${s==='on'?'ON':s==='off'?'OFF':'---'}</div>
        </div>
        <div class="relay-toggle">
          <button class="relay-btn turn-on  ${s==='on'?'active-on':''}"
            onclick="doSetRelay('${deviceId}',${i+1},true)"
            ${s==='on'?'disabled':''}>ON</button>
          <button class="relay-btn turn-off ${s==='off'?'active-off':''}"
            onclick="doSetRelay('${deviceId}',${i+1},false)"
            ${s==='off'?'disabled':''}>OFF</button>
        </div>
      </div>`;
  }
  return html;
}

// Actualiza solo las celdas que hayan cambiado (evita parpadeos)
function updateRelaysUI(deviceId, relays) {
  for (const r of relays) {
    const cell = $(`rc-${deviceId}-${r.relay}`);
    if (!cell) continue;
    const s = r.state;
    const dot   = cell.querySelector('.relay-dot');
    const label = cell.querySelector('.relay-label');
    const btnOn  = cell.querySelectorAll('.relay-btn')[0];
    const btnOff = cell.querySelectorAll('.relay-btn')[1];
    // Solo actualizar si cambió
    if (dot.className.includes(s)) continue;
    dot.className   = `relay-dot ${s}`;
    label.className = `relay-label ${s}`;
    label.textContent = s==='on'?'ON':s==='off'?'OFF':'---';
    btnOn.className  = `relay-btn turn-on  ${s==='on'?'active-on':''}`;
    btnOff.className = `relay-btn turn-off ${s==='off'?'active-off':''}`;
    btnOn.disabled   = s==='on';
    btnOff.disabled  = s==='off';
  }
}

// ─── Acciones ─────────────────────────────────────────────────────────────────

async function doSetRelay(deviceId, relay, state) {
  const cell = $(`rc-${deviceId}-${relay}`);
  // Spinner
  const ov = document.createElement('div');
  ov.className = 'spin-ov';
  ov.innerHTML = '<div class="spin"></div>';
  cell?.appendChild(ov);
  cell?.querySelectorAll('.relay-btn').forEach(b => b.disabled = true);

  setStatus(`${deviceId} → relé ${relay} ${state?'ON':'OFF'}...`);
  try {
    const res = await fetch(`${apiBase()}/device/${deviceId}/relay/${relay}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ state })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

    // La respuesta incluye el estado real confirmado por el dispositivo vía UDP
    storeRelays(deviceId, data.relays);
    setStatus(`relé ${relay} → ${state?'ON':'OFF'} ✓`, 'ok');
  } catch (e) {
    setStatus(`error: ${e.message}`, 'err');
    ov.remove();
    // Restaurar estado guardado
    const saved = deviceState[deviceId]?.relays;
    if (saved) updateRelaysUI(deviceId, saved);
  } finally {
    ov.remove();
  }
}

async function doQuery(deviceId) {
  const btn = $(`qbtn-${deviceId}`);
  if (btn) btn.disabled = true;
  setStatus(`${deviceId}: query UDP...`);
  try {
    const res  = await fetch(`${apiBase()}/device/${deviceId}/query`, { method:'POST' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    storeRelays(deviceId, data.relays);
    setStatus(`${deviceId}: estado actualizado ✓`, 'ok');
  } catch (e) {
    setStatus(`error: ${e.message}`, 'err');
  } finally {
    if (btn) btn.disabled = false;
  }
}

// All on/off: secuencial, espera UDP de cada relé
async function doAll(deviceId, state) {
  for (let i = 1; i <= 8; i++) {
    await doSetRelay(deviceId, i, state);
  }
}

// Arranque
fetchDevices();
</script>
</body>
</html>
